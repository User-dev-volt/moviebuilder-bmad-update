code: cpm
name: "CPM: Cinematic Production Module"
header: "External State Machine for AI Video Generation"
subheader: "Cinematics as Code - solving the Vibe-Drift Gap with document-based continuity"
default_selected: false

# Variables from Core Config inserted:
## user_name
## communication_language
## document_output_language
## output_folder

project_name:
  prompt: "What is the title of your cinematic project?"
  default: "{directory_name}"
  result: "{value}"

model_target:
  prompt:
    - "Which AI video generator will you use?"
    - "This affects prompt formatting and optimization."
  default: "wan"
  result: "{value}"
  single-select:
    - value: "wan"
      label: "Wan 2.2 (Local) - Text-to-Video / Image-to-Video"
    - value: "sora"
      label: "OpenAI Sora"
    - value: "kling"
      label: "Kling AI"
    - value: "runway"
      label: "Runway Gen-3"
    - value: "other"
      label: "Other / Custom"

default_shard_duration:
  prompt: "Default duration for temporal shards (in seconds)?"
  default: "5"
  result: "{value}"
  single-select:
    - value: "5"
      label: "5 seconds (recommended for tight continuity)"
    - value: "10"
      label: "10 seconds (balanced)"
    - value: "15"
      label: "15 seconds (longer takes)"
    - value: "30"
      label: "30 seconds (maximum)"

enable_strict_validation:
  prompt: "Enable strict Continuity Acceptance Criteria (CAC) validation?"
  default: true
  result: "{value}"

cpm_output_folder:
  prompt: "Where should CPM project outputs be created?"
  default: "{output_folder}/cpm-projects"
  result: "{project-root}/{value}"
