# .cpm/config.yaml
# CPM Project Configuration
# Generated by the CPM new-project workflow

project_name: "${project_name}"
version: "${version}"
created: "${created}"

# Temporal Sharding Settings
temporal:
  default_shard_duration: ${default_shard_duration}    # seconds
  max_shard_duration: ${max_shard_duration}       # seconds

# AI Video Generator Target
model:
  target: "${model_target}"
  # Options: sora, kling, runway, pika, or any other model id

# Agent Configuration
agents:
  # The prompt_file paths below are optional per-project overrides — empty by default.
  # The CPM agents run as installed skills unless a project drops a custom prompt file
  # at the path shown. The keys are required; the files they point to are not.
  showrunner:
    enabled: true
    prompt_file: ".cpm/agents/showrunner.md"
  cinematographer:
    enabled: true
    prompt_file: ".cpm/agents/cinematographer.md"
  script_supervisor:
    enabled: true
    prompt_file: ".cpm/agents/script-supervisor.md"
  prompt_engineer:
    enabled: true
    prompt_file: ".cpm/agents/prompt-engineer.md"

# Validation Settings
validation:
  require_state_diff_check: true
  require_style_compliance: true
  banned_words_enforcement: true
