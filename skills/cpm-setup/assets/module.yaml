# Cinematic Production Module (CPM) — module definition
# Generated by Create Module (CM). Identity + install-time defaults + agent roster.

code: cpm
name: "Cinematic Production Module"
description: "External state machine for AI video generation — Cinematics as Code. A 5-agent crew plus structured workflows bring BMAD-level rigor to AI filmmaking, holding character, style, and continuity across every generation."
module_version: 1.0.0
default_selected: false
module_greeting: >
  🎬 Cinematic Production Module is installed. Your crew is on set —
  Orson (Director), Albus (Story), Galadriel (Visuals), Jonas (Continuity), and Leonard (Prompt).
  Start a production with cpm-inception (guided onboarding) or cpm-new-project (manual scaffold),
  then talk to cpm-orchestrator anytime to find your next step. Re-run this setup whenever you
  want to change the defaults below.

# --- Install-time defaults for new productions (each project may override in its own .cpm/config.yaml) ---

target_model:
  prompt: "Default AI video model for new productions? (sora / kling / runway / pika)"
  default: "sora"

default_shard_duration:
  prompt: "Default shard duration in seconds for new productions? (5 / 15 / 30)"
  default: "5"

# --- Agent roster (lifted verbatim from each agent skill's customize.toml [agent] block) ---

agents:
  - code: orchestrator
    name: "Orson"
    title: "The Film Director"
    icon: "🎬"
    description: "Single entry point for CPM production — reads project state and routes to the right agent or workflow."
  - code: showrunner
    name: "Albus"
    title: "Story Guardian & Creative Visionary"
    icon: "📖"
    description: "Story guardian for CPM productions — breaks scenes into atomic beats, tracks narrative contracts, and protects the Show Bible from contradiction."
  - code: cinematographer
    name: "Galadriel"
    title: "Visual Architect & Style Guardian"
    icon: "🎥"
    description: "Visual guardian for CPM productions — architects lighting, lens, and color for every beat, enforces exact hex codes and the banned-word list, and protects the Style Guide from violation."
  - code: script-supervisor
    name: "Jonas"
    title: "Continuity Guardian & State Tracker"
    icon: "📋"
    description: "Continuity guardian for CPM productions — validates character state, actively injects missing details, defines shard handshakes, and hard-gates the pipeline before any prompt compiles."
  - code: prompt-engineer
    name: "Leonard Shelby"
    title: "Prompt Compiler & AI Whisperer"
    icon: "🧩"
    description: "Prompt compiler for CPM productions — synthesizes the Showrunner, Cinematographer, and Script Supervisor outputs into a final AI video prompt, with critical features front-loaded and no banned words."
